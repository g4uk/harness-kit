# Invariant #6 as code, Docker edition: the agent's own run always executes
# in the harness-runner sandbox. Checks (human-approved via /harness:retro) run there
# too by default, but HARNESS_EVAL_CHECKS_HOST=1 below opts this runner out —
# it's already a fresh, single-job VM with a native Docker daemon, so
# docker/docker-compose checks actually work instead of hitting a sandbox
# with no docker CLI. evals/run.sh itself has no opinion on CI vendor; this
# is the GitHub-specific wiring for it.
name: harness-evals
# Triggers always active — no manual re-enabling needed later. evals/run.sh
# itself checks EVAL_MIN_TRACES and exits instantly (before any API call) if
# there aren't enough traces yet for a baseline worth protecting (Stage 3 in
# scenarios/greenfield.md, ~6). It self-adjusts as traces accumulate — once
# past the threshold, real runs start happening automatically.
on:
  workflow_dispatch: {}
  pull_request:
    paths: ['.claude/**', 'CLAUDE.md', 'evals/**', 'docker/**']
  push:
    branches: [main]
    paths: ['.claude/**', 'CLAUDE.md', 'evals/**', 'docker/**']
jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Build runner image
        run: docker build -t harness-runner:latest docker/
      - name: Run evals (sample on PR, full on main)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_LIMIT: ${{ github.event_name == 'pull_request' && 3 || 0 }}
          # workflow_dispatch = a human explicitly asked for a real run — skip
          # the trace-count gate; push/pull_request stay self-adjusting.
          EVAL_MIN_TRACES: ${{ github.event_name == 'workflow_dispatch' && '0' || '6' }}
          HARNESS_EVAL_CHECKS_HOST: "1"
        run: ./evals/run.sh

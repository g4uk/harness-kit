# Invariant #6 as code, Docker edition: the agent's own run always executes
# in the harness-runner sandbox. Checks (human-approved via /retro) run there
# too by default, but HARNESS_EVAL_CHECKS_HOST=1 below opts this runner out —
# it's already a fresh, single-job VM with a native Docker daemon, so
# docker/docker-compose checks actually work instead of hitting a sandbox
# with no docker CLI. evals/run.sh itself has no opinion on CI vendor; this
# is the GitHub-specific wiring for it.
name: harness-evals
# Auto-triggers OFF by default — this costs a real API call per trace, and
# with <6 traces (Stage 3 trigger in scenarios/greenfield.md) it fires on
# every /retro commit (which always touches CLAUDE.md + evals/traces/) for
# little regression-catching value yet. Run manually via workflow_dispatch
# (Actions tab → harness-evals → Run workflow, or `gh workflow run
# harness-evals`) until you have a real baseline. Then uncomment below.
on:
  workflow_dispatch: {}
  # pull_request:
  #   paths: ['.claude/**', 'CLAUDE.md', 'evals/**', 'docker/**']
  # push:
  #   branches: [main]
  #   paths: ['.claude/**', 'CLAUDE.md', 'evals/**', 'docker/**']
jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Build runner image
        run: docker build -t harness-runner:latest docker/
      - name: Run evals (sample on PR, full on main)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_LIMIT: ${{ github.event_name == 'pull_request' && 3 || 0 }}
          HARNESS_EVAL_CHECKS_HOST: "1"
        run: ./evals/run.sh
